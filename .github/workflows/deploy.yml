name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deploy host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Configure SSH alias for Envoy
        run: |
          cat <<EOF >> ~/.ssh/config
          Host zangi-production
            HostName ${{ secrets.DEPLOY_HOST }}
            User ${{ secrets.DEPLOY_USER }}
            Port ${{ secrets.DEPLOY_PORT }}
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy with Envoy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PUBLIC_PATH: ${{ secrets.DEPLOY_PUBLIC_PATH }}
          DEPLOY_BRANCH: main
          DEPLOY_REPOSITORY: ${{ secrets.DEPLOY_REPOSITORY }}
          DEPLOY_PHP_BIN: ${{ secrets.DEPLOY_PHP_BIN }}
          DEPLOY_COMPOSER_BIN: ${{ secrets.DEPLOY_COMPOSER_BIN }}
          DEPLOY_NPM_BIN: ${{ secrets.DEPLOY_NPM_BIN }}
          DEPLOY_PHP_FPM_SERVICE: ${{ secrets.DEPLOY_PHP_FPM_SERVICE }}
          DEPLOY_QUEUE_RESTART: ${{ secrets.DEPLOY_QUEUE_RESTART }}
          DEPLOY_BUILD_FRONTEND: ${{ secrets.DEPLOY_BUILD_FRONTEND }}
        run: php vendor/bin/envoy run deploy
